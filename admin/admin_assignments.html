<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Drivers | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00fa9a;
            --secondary: #7f5cff;
            --dark: #080810;
            --dark-card: #12121e;
            --dark-elevated: #1a1a2e;
            --glass-border: rgba(255,255,255,0.08);
            --text-dim: #94a3b8;
            --grad-main: linear-gradient(135deg, #00fa9a, #7f5cff);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: white; min-height: 100vh; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }

        header {
            background: rgba(8,8,16,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 20px 8%; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 22px; font-weight: 800; background: var(--grad-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .back-btn {
            padding: 10px 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 10px; color: white; cursor: pointer; text-decoration: none; font-size: 14px; font-weight: 600; transition: 0.3s;
        }
        .back-btn:hover { border-color: var(--primary); color: var(--primary); }

        .page-header { padding: 40px 8% 20px; }
        .page-header h2 { font-size: 32px; margin-bottom: 8px; }
        .page-header p { color: var(--text-dim); font-size: 15px; }

        .container { padding: 20px 8% 60px; }

        /* Request Cards */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 24px; }

        .request-card {
            background: var(--dark-card); border: 1px solid var(--glass-border);
            border-radius: 20px; overflow: hidden; transition: 0.3s;
        }
        .request-card:hover { border-color: rgba(127,92,255,0.4); }

        .card-header {
            padding: 20px 24px; background: rgba(127,92,255,0.08);
            border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .card-header h3 { font-size: 17px; font-weight: 700; }
        .card-header .booking-id { font-size: 12px; color: var(--text-dim); }

        .card-body { padding: 20px 24px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
        .info-row .label { color: var(--text-dim); }
        .info-row .value { font-weight: 600; text-align: right; }

        .driver-select-section { margin-top: 20px; border-top: 1px solid var(--glass-border); padding-top: 18px; }
        .driver-select-section label { font-size: 13px; color: var(--text-dim); display: block; margin-bottom: 10px; font-weight: 600; }

        select.driver-dropdown {
            width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border); border-radius: 12px;
            color: white; font-family: inherit; font-size: 14px; outline: none; transition: 0.3s;
        }
        select.driver-dropdown:focus { border-color: var(--secondary); }
        select.driver-dropdown option { background: #12121e; }

        .no-drivers-msg { font-size: 13px; color: #ff4757; padding: 12px; background: rgba(255,71,87,0.08); border-radius: 10px; text-align: center; }

        .assign-btn {
            width: 100%; margin-top: 14px; padding: 14px;
            background: var(--grad-main); color: #080810;
            border: none; border-radius: 12px; font-weight: 800;
            font-family: 'Outfit', sans-serif; font-size: 15px;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .assign-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,250,154,0.2); }
        .assign-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .assigned-tag {
            display: flex; align-items: center; gap: 8px; font-size: 13px;
            color: var(--primary); font-weight: 600; padding: 12px; background: rgba(0,250,154,0.08);
            border-radius: 10px; margin-top: 14px;
        }

        .empty-state { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--text-dim); font-size: 16px; }
        .empty-state i { font-size: 48px; margin-bottom: 15px; display: block; color: var(--primary); }

        /* Toast */
        #toast {
            position: fixed; bottom: 30px; right: 30px; background: var(--dark-card);
            border: 1px solid var(--glass-border); border-radius: 12px; padding: 15px 22px;
            display: none; font-size: 14px; font-weight: 600; z-index: 9999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); min-width: 240px;
        }
    </style>
</head>
<body>
<header>
    <div class="logo"><i class="fas fa-bolt" style="color:#00fa9a;"></i> Admin Portal</div>
    <a href="admin_dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
</header>

<div class="page-header">
    <h2>Assign Drivers to Bookings</h2>
    <p>Customers who requested a platform driver. Assign an available, approved driver to each booking.</p>
</div>

<div class="container">
    <div id="requestsGrid" class="cards-grid">
        <div class="empty-state"><i class="fas fa-spinner fa-spin"></i>Loading requests...</div>
    </div>
</div>

<div id="toast"></div>

<script>
    const API = '/api';
    const user = JSON.parse(localStorage.getItem('car_rental_user'));
    if (!user || user.role !== 'admin') {
        alert('Admin access only.');
        window.location.href = 'admin_dashboard.html';
    }

    let requests = [];

    async function loadRequests() {
        try {
            const [reqRes] = await Promise.all([
                fetch(`${API}/admin/driver-requests`)
            ]);
            const reqData = await reqRes.json();
            requests = reqData.requests || [];

            if (requests.length === 0) {
                document.getElementById('requestsGrid').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-check-circle"></i>
                        No pending driver requests! All bookings are fulfilled.
                    </div>`;
                return;
            }

            // For each request, fetch available drivers
            const cards = await Promise.all(requests.map(async (req) => {
                let driversHtml = `<div class="no-drivers-msg"><i class="fas fa-exclamation-triangle"></i> No approved drivers available for this time slot.</div>`;
                let assignBtnHtml = '';

                try {
                    const dRes = await fetch(`${API}/admin/available-drivers`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            pickup_datetime: req.pickup_datetime,
                            drop_datetime: req.drop_datetime
                        })
                    });
                    const dData = await dRes.json();
                    const drivers = dData.drivers || [];

                    if (drivers.length > 0) {
                        const options = drivers.map(d => `<option value="${d.id}">${d.full_name} — ${d.mobile} (${d.vehicle_type || 'Any'})</option>`).join('');
                        driversHtml = `
                            <label>Select Available Driver</label>
                            <select class="driver-dropdown" id="driverSelect-${req.id}">
                                <option value="">— Choose a driver —</option>
                                ${options}
                            </select>`;
                        assignBtnHtml = `<button class="assign-btn" id="assignBtn-${req.id}" onclick="assignDriver(${req.id})">
                            <i class="fas fa-user-check"></i> Assign Driver
                        </button>`;
                    }
                } catch (e) { /* no change */ }

                const pickupDate = new Date(req.pickup_datetime).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });
                const dropDate = new Date(req.drop_datetime).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });

                return `
                    <div class="request-card" id="card-${req.id}">
                        <div class="card-header">
                            <div>
                                <h3>${req.car_name || 'Car'}</h3>
                                <div class="booking-id">Booking #${req.id} &nbsp;|&nbsp; <span style="color:orange;">⏳ Pending Driver</span></div>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="info-row"><span class="label">Customer</span><span class="value">${req.customer_name || '-'}</span></div>
                            <div class="info-row"><span class="label">Mobile</span><span class="value">${req.customer_mobile || '-'}</span></div>
                            <div class="info-row"><span class="label">Pickup</span><span class="value">${req.pickup_location || '-'}</span></div>
                            <div class="info-row"><span class="label">Drop</span><span class="value">${req.drop_location || '-'}</span></div>
                            <div class="info-row"><span class="label">From</span><span class="value">${pickupDate}</span></div>
                            <div class="info-row"><span class="label">Until</span><span class="value">${dropDate}</span></div>
                            <div class="driver-select-section">
                                ${driversHtml}
                                ${assignBtnHtml}
                            </div>
                        </div>
                    </div>`;
            }));

            document.getElementById('requestsGrid').innerHTML = cards.join('');
        } catch (e) {
            document.getElementById('requestsGrid').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i>Failed to load. Is backend running?</div>`;
        }
    }

    async function assignDriver(bookingId) {
        const sel = document.getElementById(`driverSelect-${bookingId}`);
        const driverId = sel ? sel.value : '';
        if (!driverId) {
            showToast('Please select a driver first ⚠️', '#ffa500');
            return;
        }

        const btn = document.getElementById(`assignBtn-${bookingId}`);
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Assigning...';

        try {
            const res = await fetch(`${API}/admin/assign-driver`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ booking_id: bookingId, driver_id: parseInt(driverId) })
            });
            const data = await res.json();
            if (data.success) {
                showToast('Driver assigned successfully! ✅', '#00fa9a');
                // Replace card section with success indicator
                const section = sel.closest('.driver-select-section');
                const driverText = sel.options[sel.selectedIndex].text;
                section.innerHTML = `<div class="assigned-tag"><i class="fas fa-check-circle"></i> Assigned: ${driverText}</div>`;
                document.getElementById(`card-${bookingId}`).querySelector('.booking-id').innerHTML = `Booking #${bookingId} &nbsp;|&nbsp; <span style="color:var(--primary);">✅ Confirmed</span>`;
            } else {
                showToast(data.message || 'Assignment failed ❌', '#ff4757');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-check"></i> Assign Driver';
            }
        } catch (e) {
            showToast('Connection error ❌', '#ff4757');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-user-check"></i> Assign Driver';
        }
    }

    function showToast(msg, color = '#00fa9a') {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.color = color;
        t.style.borderColor = color + '40';
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3500);
    }

    loadRequests();
</script>
</body>
</html>
