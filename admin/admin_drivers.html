<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Applications | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00fa9a;
            --primary-dark: #00c9a7;
            --secondary: #7f5cff;
            --dark: #080810;
            --dark-card: #12121e;
            --glass-border: rgba(255,255,255,0.08);
            --text-dim: #94a3b8;
            --grad-main: linear-gradient(135deg, #00fa9a, #7f5cff);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: white; min-height: 100vh; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }

        header {
            background: rgba(8,8,16,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 20px 8%; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 22px; font-weight: 800; background: var(--grad-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .back-btn {
            padding: 10px 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 10px; color: white; cursor: pointer; text-decoration: none; font-size: 14px; font-weight: 600; transition: 0.3s;
        }
        .back-btn:hover { border-color: var(--primary); color: var(--primary); }

        .page-header { padding: 40px 8% 20px; }
        .page-header h2 { font-size: 32px; margin-bottom: 8px; }
        .page-header p { color: var(--text-dim); font-size: 15px; }

        .container { padding: 20px 8% 60px; }

        /* Stats Bar */
        .stats { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .stat-card {
            background: var(--dark-card); border: 1px solid var(--glass-border); border-radius: 16px;
            padding: 20px 30px; flex: 1; min-width: 140px;
        }
        .stat-card .num { font-size: 32px; font-weight: 800; background: var(--grad-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-card .label { font-size: 13px; color: var(--text-dim); margin-top: 4px; }

        /* Table */
        .table-wrapper { background: var(--dark-card); border: 1px solid var(--glass-border); border-radius: 20px; overflow-x: auto; overflow-y: visible; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        thead { background: rgba(255,255,255,0.03); }
        th { padding: 18px 20px; text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-weight: 700; }
        td { padding: 16px 20px; font-size: 14px; border-top: 1px solid var(--glass-border); vertical-align: middle; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .badge {
            display: inline-block; padding: 4px 12px; border-radius: 100px; font-size: 12px; font-weight: 700;
        }
        .badge.pending { background: rgba(255,165,0,0.15); color: #ffa500; }
        .badge.approved { background: rgba(0,250,154,0.15); color: var(--primary); }
        .badge.rejected { background: rgba(255,71,87,0.15); color: #ff4757; }

        .action-btns { display: flex; gap: 8px; }
        .btn-approve {
            padding: 8px 16px; background: rgba(0,250,154,0.1); color: var(--primary);
            border: 1px solid rgba(0,250,154,0.3); border-radius: 8px; cursor: pointer;
            font-size: 13px; font-weight: 600; transition: 0.3s;
        }
        .btn-approve:hover { background: rgba(0,250,154,0.2); }
        .btn-reject {
            padding: 8px 16px; background: rgba(255,71,87,0.1); color: #ff4757;
            border: 1px solid rgba(255,71,87,0.3); border-radius: 8px; cursor: pointer;
            font-size: 13px; font-weight: 600; transition: 0.3s;
        }
        .btn-reject:hover { background: rgba(255,71,87,0.2); }

        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-dim); font-size: 16px; }
        .empty-state i { font-size: 48px; margin-bottom: 15px; display: block; }

        /* Toast */
        #toast {
            position: fixed; bottom: 30px; right: 30px; background: var(--dark-card);
            border: 1px solid var(--glass-border); border-radius: 12px; padding: 15px 22px;
            display: none; font-size: 14px; font-weight: 600; z-index: 9999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); min-width: 240px;
        }
    </style>
</head>
<body>
<header>
    <div class="logo"><i class="fas fa-bolt" style="color:#00fa9a;"></i> Admin Portal</div>
    <a href="admin_dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
</header>

<div class="page-header">
    <h2>Driver Applications</h2>
    <p>Review pending driver applications and approve or reject them.</p>
</div>

<div class="container">
    <div class="stats">
        <div class="stat-card"><div class="num" id="pendingCount">-</div><div class="label">Pending Review</div></div>
        <div class="stat-card"><div class="num" id="totalCount">-</div><div class="label">Loaded</div></div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Mobile</th>
                    <th>License</th>
                    <th>License Type</th>
                    <th>Vehicle</th>
                    <th>Applied On</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="driversBody">
                <tr><td colspan="10" class="empty-state"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="toast"></div>

<script>
    const API = '/api';
    const user = JSON.parse(localStorage.getItem('car_rental_user'));
    if (!user || user.role !== 'admin') {
        alert('Admin access only.');
        window.location.href = 'admin_dashboard.html';
    }

    let allDrivers = [];

    async function loadDrivers() {
        try {
            const res = await fetch(`${API}/admin/pending-drivers`);
            const data = await res.json();
            allDrivers = data.drivers || [];
            document.getElementById('pendingCount').innerText = allDrivers.length;
            document.getElementById('totalCount').innerText = allDrivers.length;
            renderTable(allDrivers);
        } catch (e) {
            showToast('Failed to load drivers ❌', '#ff4757');
        }
    }

    function renderTable(drivers) {
        const body = document.getElementById('driversBody');
        if (drivers.length === 0) {
            body.innerHTML = `<tr><td colspan="10" class="empty-state"><i class="fas fa-check-circle"></i>No pending applications. All caught up!</td></tr>`;
            return;
        }
        body.innerHTML = drivers.map((d, i) => `
            <tr id="row-${d.id}">
                <td>${i + 1}</td>
                <td><b>${d.full_name}</b></td>
                <td>${d.email}</td>
                <td>${d.mobile}</td>
                <td>${d.license_number || '-'}</td>
                <td>${d.license_type || '-'}</td>
                <td>${d.vehicle_type || '-'} ${d.vehicle_model ? '(' + d.vehicle_model + ')' : ''}</td>
                <td>${d.created_at ? new Date(d.created_at).toLocaleDateString() : '-'}</td>
                <td><span class="badge pending">Pending</span></td>
                <td>
                    <div class="action-btns">
                        <button class="btn-approve" onclick="updateDriver(${d.id}, 'Approved')"><i class="fas fa-check"></i> Approve</button>
                        <button class="btn-reject" onclick="updateDriver(${d.id}, 'Rejected')"><i class="fas fa-times"></i> Reject</button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    async function updateDriver(driverId, status) {
        try {
            const res = await fetch(`${API}/admin/update-driver-status`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ driver_id: driverId, status: status })
            });
            const data = await res.json();
            if (data.success) {
                const row = document.getElementById(`row-${driverId}`);
                if (row) {
                    const badge = row.querySelector('.badge');
                    badge.className = `badge ${status.toLowerCase()}`;
                    badge.innerText = status;
                    row.querySelector('.action-btns').innerHTML = '';
                }
                showToast(`Driver ${status}! ✅`, status === 'Approved' ? '#00fa9a' : '#ff4757');
            } else {
                showToast('Failed to update ❌', '#ff4757');
            }
        } catch (e) {
            showToast('Connection error ❌', '#ff4757');
        }
    }

    function showToast(msg, color = '#00fa9a') {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.color = color;
        t.style.borderColor = color + '40';
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3500);
    }

    loadDrivers();
</script>
</body>
</html>
