<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Monitoring Dashboard - CarRentalPro</title>
  <link rel="stylesheet" href="../design_system.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body {
      background-color: var(--dark);
      color: white;
      height: 100vh;
      margin: 0;
      display: flex;
      font-family: 'Inter', sans-serif;
    }

    /* Sidebar Styles */
    .sidebar {
      width: 350px;
      background: var(--dark-elevated);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      z-index: 1000;
    }

    .sidebar-header {
      padding: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .sidebar-header h1 {
      font-size: 20px;
      margin: 0;
      background: linear-gradient(to right, white, var(--primary));
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .trip-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .trip-item {
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid transparent;
      transition: 0.3s;
      cursor: pointer;
    }

    .trip-item:hover {
      background: rgba(255,255,255,0.05);
      border-color: var(--primary);
    }

    .trip-item.active {
      background: rgba(0, 201, 167, 0.1);
      border-color: var(--primary);
    }

    .trip-item h3 {
      font-size: 14px;
      margin: 0 0 5px 0;
    }

    .trip-item p {
      font-size: 12px;
      color: #888;
      margin: 0;
    }

    .status-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      margin-top: 5px;
      background: rgba(0, 201, 167, 0.2);
      color: var(--primary);
    }

    /* Map Styles */
    #monitorMap {
      flex: 1;
      z-index: 1;
    }

    .map-controls {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 1000;
    }

    .count-card {
      background: rgba(21, 19, 32, 0.9);
      backdrop-filter: blur(20px);
      padding: 10px 20px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
    }
  </style>
    <link rel="stylesheet" href="../ai_assistant/roadmind.css">
    <script src="../ai_assistant/roadmind.js" defer></script>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Live Fleet Monitor</h1>
      <p style="font-size: 12px; color: #666; margin-top: 5px;">Company Tracking System</p>
    </div>
    
    <div id="tripList" class="trip-list">
      <div class="loading-state" style="padding: 20px; text-align: center; color: #666;">
        <i class="fas fa-spinner fa-spin"></i> Refreshing live data...
      </div>
    </div>
  </div>

  <div id="monitorMap"></div>
  
  <div class="map-controls">
    <div class="count-card">
      <i class="fas fa-satellite"></i> <span id="activeCount">0</span> Ongoing Trips
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const API_BASE = "/api";
    let map;
    let markers = {}; // Store markers by booking_id
    
    function initMap() {
      map = L.map('monitorMap', {
        zoomControl: true,
        attributionControl: false
      }).setView([20.5937, 78.9629], 5);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19
      }).addTo(map);
    }

    async function refreshMonitor() {
      try {
        const res = await fetch(`${API_BASE}/admin/live-trips`);
        const data = await res.json();

        if (data.success) {
          updateMap(data.trips);
          updateSidebar(data.trips);
          document.getElementById('activeCount').innerText = data.trips.length;
        }
      } catch (err) {
        console.error("Monitor Poll Error:", err);
      }
    }

    function updateMap(trips) {
      // Collect current IDs to cleanup finished trips
      const currentIds = new Set(trips.map(t => t.booking_id));
      
      // Cleanup markers for trips no longer active
      Object.keys(markers).forEach(id => {
        if (!currentIds.has(Number(id))) {
          map.removeLayer(markers[id]);
          delete markers[id];
        }
      });

      // Add/Update markers
      trips.forEach(trip => {
        const pos = [trip.latitude, trip.longitude];
        
        if (!markers[trip.booking_id]) {
          const marker = L.marker(pos, {
            icon: L.divIcon({
              className: 'custom-marker',
              html: `<div style="color: var(--primary); filter: drop-shadow(0 0 5px var(--primary));">
                      <i class="fas fa-car-side fa-2xl"></i>
                     </div>`,
              iconSize: [24, 24]
            })
          }).addTo(map);
          
          marker.bindPopup(`
            <div style="color:#000; font-family:sans-serif;">
              <strong>${trip.car_name}</strong><br>
              Driver: ${trip.driver_name}<br>
              Customer: ${trip.customer_name}
            </div>
          `);
          
          markers[trip.booking_id] = marker;
        } else {
          markers[trip.booking_id].setLatLng(pos);
        }
      });
    }

    function updateSidebar(trips) {
      const container = document.getElementById('tripList');
      if (trips.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:50px; color:#555;">No active trips currently.</div>';
        return;
      }

      container.innerHTML = trips.map(trip => `
        <div class="trip-item" onclick="focusTrip(${trip.latitude}, ${trip.longitude})">
          <h3>${trip.car_name}</h3>
          <p><i class="fas fa-id-badge"></i> Driver: ${trip.driver_name}</p>
          <p><i class="fas fa-user"></i> Customer: ${trip.customer_name}</p>
          <div class="status-pill">ONGOING</div>
          <p style="font-size:10px; color:#555; margin-top:5px;">Last Update: ${new Date(trip.last_updated).toLocaleTimeString()}</p>
        </div>
      `).join('');
    }

    function focusTrip(lat, lng) {
      map.setView([lat, lng], 15, { animate: true });
    }

    window.onload = () => {
      initMap();
      refreshMonitor();
      setInterval(refreshMonitor, 5000);
    };
  </script>
</body>
</html>
