<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root {
      --primary: #00c9a7;
      --secondary: #7f5cff;
      --accent: #9b7cff;
      --dark: #0b0a12;
      --dark-elevated: #151320;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      height: 100vh;
      background: var(--dark);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 20px;
    }

    .box {
      width: 450px;
      max-width: 95%;
      background: var(--dark-elevated);
      padding: 45px 35px;
      border-radius: 24px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
      animation: fadeInUp 0.8s ease;
      text-align: center;
    }

    h2 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(to right, white, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: #aaa;
      margin-bottom: 35px;
      font-size: 15px;
      line-height: 1.6;
    }

    input {
      width: 100%;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: white;
      margin-bottom: 25px;
      font-size: 15px;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 15px rgba(0, 201, 167, 0.1);
    }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), #00e0b9);
      border: none;
      border-radius: 12px;
      color: var(--dark);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      margin-bottom: 20px;
    }

    button:hover {
      transform: scale(1.02);
      box-shadow: 0 15px 30px rgba(0, 201, 167, 0.3);
    }

    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .back { margin-top: 15px; font-size: 14px; color: #aaa; }
    .back a { color: var(--primary); text-decoration: none; font-weight: 500; }

    .status {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
      display: none;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: #cfcfcf;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
    <link rel="stylesheet" href="../../ai_assistant/roadmind.css">
    <script src="../../ai_assistant/roadmind.js" defer></script>
</head>

<body>
  <div class="box">
    <h2>Forgot Password</h2>
    <p>Enter your email to receive OTP and reset link 📩</p>

    <form id="forgotForm">
      <input type="email" id="email" placeholder="Enter your email" required>
      <button type="submit" id="sendBtn">Send Reset Link</button>
    </form>

    <div class="status" id="statusMsg"></div>

    <div class="back">
      Back to <a href="../login.html">Login</a>
    </div>
  </div>

  <script>
    const forgotForm = document.getElementById("forgotForm");
    const statusMsg = document.getElementById("statusMsg");
    const sendBtn = document.getElementById("sendBtn");

    forgotForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;

      // UI Loading
      sendBtn.disabled = true;
      sendBtn.innerText = "Sending...";
      statusMsg.style.display = "none";

      try{
        const res = await fetch("/api/forgot-password", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({ email })
        });

        const data = await res.json();

        // ✅ Show success/fail message
        statusMsg.style.display = "block";
        statusMsg.innerText = data.message;

        if(data.success){
          // ✅ Redirect user to reset_password page automatically
          setTimeout(() => {
            window.location.href = `reset_password.html?email=${encodeURIComponent(email)}`;
          }, 1500);
        }

      }catch(err){
        statusMsg.style.display = "block";
        statusMsg.innerText = "Server error ❌ Please check backend is running";
      }

      sendBtn.disabled = false;
      sendBtn.innerText = "Send Reset Link";
    });
  </script>
</body>
</html>
