<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    :root {
      --primary: #00c9a7;
      --secondary: #7f5cff;
      --dark: #0b0a12;
      --dark-elevated: #151320;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
    }
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body{
      height:100vh;
      background:var(--dark);
      background-image: 
        radial-gradient(circle at top right, rgba(127, 92, 255, 0.05), transparent 40%),
        radial-gradient(circle at bottom left, rgba(0, 201, 167, 0.05), transparent 40%);
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      padding:20px;
    }
    .box{
      width:450px;
      max-width:95%;
      background:var(--dark-elevated);
      padding:40px;
      border-radius:24px;
      border:1px solid var(--glass-border);
      box-shadow:0 25px 60px rgba(0,0,0,0.6);
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    h2{
      text-align:center;
      margin-bottom:10px;
      font-size:28px;
      font-weight: 700;
      background: linear-gradient(to right, white, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    p{
      text-align:center;
      color:#aaa;
      margin-bottom:25px;
      font-size:14px;
      line-height:1.6;
    }
    
    input{
      width:100%;
      padding:16px 20px;
      background:rgba(255, 255, 255, 0.05);
      border:1px solid var(--glass-border);
      border-radius:12px;
      color:white;
      margin-bottom:16px;
      font-size:15px;
      outline:none;
      transition: 0.3s;
    }
    
    input:focus {
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 15px rgba(0, 201, 167, 0.1);
    }
    
    input::placeholder{color:#666;}

    button{
      width:100%;
      padding:16px;
      background:linear-gradient(135deg, var(--primary), #00e0b9);
      border:none;
      border-radius:12px;
      color:var(--dark);
      font-size:16px;
      font-weight: 700;
      cursor:pointer;
      transition:0.3s;
      margin-top: 10px;
    }
    button:hover{transform:translateY(-2px); box-shadow:0 10px 20px rgba(0, 201, 167, 0.3);}

    .back{
      margin-top:25px;
      text-align:center;
      font-size:14px;
      color: #888;
    }
    .back a{color:white;text-decoration:none;font-weight:600;transition:0.3s;}
    .back a:hover { color: var(--primary); }

    .email-box{
      margin-bottom:20px;
      padding:12px;
      background:rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      border-radius:12px;
      font-size:14px;
      color:#aaa;
      text-align:center;
    }
    .email-box strong { color: white; margin-left: 5px; }
  </style>
    <link rel="stylesheet" href="../../ai_assistant/roadmind.css">
    <script src="../../ai_assistant/roadmind.js" defer></script>
</head>

<body>

  <div class="box">
    <h2>Reset Password</h2>
    <p>Enter OTP from your email and set a new password 🔐</p>

    <div class="email-box" id="showEmail">Email: </div>

    <form id="resetForm">
      <input type="text" id="otp" placeholder="Enter OTP (6 digits)" required>
      <input type="password" id="newPassword" placeholder="New Password" required>
      <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
      <button type="submit">Reset Password</button>
    </form>

    <div class="back">
      Back to <a href="../login.html">Login</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const email = params.get("email");

    if(!email){
      alert("Email missing ❌ Please go back and request reset again.");
      window.location.href = "forgot_password.html";
    }

    document.getElementById("showEmail").innerText = "Email: " + email;

    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const otp = document.getElementById("otp").value;
      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if(newPassword !== confirmPassword){
        alert("Passwords do not match ❌");
        return;
      }

      try{
        const res = await fetch("/api/reset-password", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({ email, otp, new_password: newPassword })
        });

        const data = await res.json();
        alert(data.message);

        if(data.success){
          window.location.href = "../login.html";
        }

      }catch(err){
        alert("Server error ❌ Make sure backend is running");
      }
    });
  </script>

</body>
</html>
