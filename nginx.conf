server {
    listen 8080;
    server_name _;
    client_max_body_size 100M;

    root /app;
    index index.html;

    # Gzip compression to speed up the load for ALL elements
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Serve static frontend files with caching
    location / {
        try_files $uri $uri/ =404;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy API requests to main Flask (Gunicorn)
    location /api/ {
        proxy_pass http://127.0.0.1:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increased timeouts for heavy data requests
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }

    # Proxy ML API requests to the main Flask backend (consolidated)
    location /ml-api/ {
        proxy_pass http://127.0.0.1:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 300s;
    }
}
